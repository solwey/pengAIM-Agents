services:
  # PostgreSQL database for LangGraph and metadata
  postgres:
    image: pgvector/pgvector:pg18
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aegra Server
  aegra:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/app/src
      - REDIS_BROKER_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - WORKER_COUNT=3
      - N_JOBS_PER_WORKER=10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:$${PORT:-2026}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./aegra.json:/app/aegra.json:ro
      - ./libs/aegra-api/src:/app/src:ro  # Mount full src for PYTHONPATH to work
      - ./libs/aegra-api/alembic:/app/alembic:ro # for migrations
      - ./auth.py:/app/auth.py:ro
      - ./graphs:/app/graphs:ro
    command: ["uvicorn", "aegra_api.main:app", "--host", "0.0.0.0", "--port", "${PORT:-2026}", "--reload"]

  # Redis - enables multi-instance SSE streaming with pub/sub + replay
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
